# ============================================================
# The following are configured via environment variables at runtime:
#
# ANTHROPIC_API_KEY        — Anthropic Claude API key
# GITHUB_TOKEN             — GitHub token (fallback)
# GITHUB_APP_TOKEN         — GitHub token for app repositories
# GITHUB_INFRA_TOKEN       — GitHub token for infra repositories
# GITHUB_K8S_GITOPS_TOKEN  — GitHub token for k8s-gitops repositories
# DATADOG_API_KEY          — Datadog API key
# DATADOG_APP_KEY          — Datadog application key
# AZURE_ACCESS_TOKEN       — Azure Resource Manager access token
# AZURE_SUBSCRIPTION_ID    — Azure subscription ID
# AZURE_RESOURCE_GROUP     — Azure resource group for managed resources
# AKS_CLUSTER_NAME         — AKS cluster name (optional)
# CONFLUENCE_URL           — Confluence base URL, e.g. https://your-org.atlassian.net
# CONFLUENCE_USERNAME      — Confluence username (email)
# CONFLUENCE_API_TOKEN     — Confluence API token
# MYSQL_USER               — MySQL user for table size queries
# MYSQL_PASSWORD           — MySQL password for table size queries
# MYSQL_PORT               — MySQL port (default: 3306)
# ============================================================